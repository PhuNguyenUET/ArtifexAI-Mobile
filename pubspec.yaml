name: artifex_ai_mobile
description: "A mobile application to generate images and videos for 2D games"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  collection: ^1.18.0
  jwt_decoder: ^2.0.1

  # Local
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

  # route
  go_router: ^17.1.0
  # Flutter helper
  pin_code_fields: ^9.1.0

  dio_cache_interceptor: ^4.0.5
  path_provider: ^2.1.3
  path: ^1.9.0
  http_parser: ^4.0.2

  google_fonts: ^8.0.2
  google_mlkit_face_detection: ^0.13.2
  bot_toast: ^4.1.3
  tuple: ^2.0.2

  # build
  json_annotation: ^4.11.0
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  json_serializable: ^6.13.0
  in_app_purchase: ^3.1.13
  in_app_purchase_storekit: any
  in_app_purchase_android: any

  # State management
  flutter_bloc: ^9.1.1

  # Shorebird code push
  shorebird_code_push: ^2.0.5

  # DI
  get_it: ^9.2.1

  # Network
  dio: ^5.4.0
  dio_smart_retry: ^7.0.1
  flutter_cache_manager: ^3.3.2

  # Firebase
  firebase_core: ^4.4.0
  firebase_analytics: ^12.1.2
  firebase_crashlytics: ^5.0.7
  firebase_messaging: ^16.1.1
  firebase_in_app_messaging: ^0.9.0+6
  firebase_storage: ^13.0.6
  cloud_firestore: ^6.1.2

  video_player: ^2.8.2
  intl: ^0.20.2
  device_preview: ^1.3.1

  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  image_picker: ^1.0.7
  photo_view: ^0.15.0
  permission_handler: ^12.0.1
  carousel_slider: ^5.1.2
  volume_controller: ^3.4.2
  flutter_image_compress: ^2.4.0
  device_info_plus: ^12.3.0
  timeago: ^3.6.1

  # UI widget
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  popover: ^0.4.0
  photo_manager: ^3.1.1
  after_layout: ^1.2.0
  cached_network_image: ^3.4.1
  intro_slider: ^4.2.1
  modal_bottom_sheet: ^3.0.0-pre
  tiengviet: ^1.0.0
  webview_flutter: ^4.7.0
  url_launcher: ^6.2.4
  flutter_html: ^3.0.0-beta.1
  barcode: ^2.2.6
  html: ^0.15.4
  dotted_decoration: ^2.0.0
  dots_indicator: ^4.0.1
  flutter_spinkit: ^5.2.0
  font_awesome_flutter: ^10.7.0
  image: ^4.1.7
  lottie: ^3.1.0
  country_ip: ^3.0.0
  flutter_web_auth_2: ^5.0.2
  marquee: ^2.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  intl_utils: ^2.8.14
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/bold/
    - assets/icons/outline/
    - assets/icons/custom/
    - assets/img/
    - assets/img/app_icon/
    - assets/img/background/
    - assets/img/color/
    - assets/img/icon/
    - assets/loading/
    - assets/
    - assets/icons/
flutter_intl:
  enabled: true
  class_name: AppLocale
  main_locale: vi
  arb_dir: lib/generated/l10n
  output_dir: lib/generated

flutter_assets_generator:
  # Optional. Sets the directory of generated localization files. Provided value should be a valid path on lib dir. Default: generated
  output_dir: generated
  # Optional. Sets whether automatic monitoring of file changes. Default: true
  auto_detection: true
  # Optional. Sets file name conversion rules. Default: true
  named_with_parent: true
  # Optional. Sets the name for the generated localization file. Default: assets
  output_filename: assets
  # Optional. Sets the name for the generated localization class. Default: Assets
  class_name: Assets
  # Optional. Sets the filename split pattern for filename split. Default: [-_]
  filename_split_pattern: "[-_]"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/img/app_icon/App_Icon_Background.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#0D0B1E"
  adaptive_icon_foreground: "assets/img/app_icon/App_Icon_Transparent.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

